name: Build Android APK [Optimized]

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]  
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    env:
      ANDROID_HOME: /home/runner/android-sdk
      ANDROID_NDK_ROOT: /home/runner/android-ndk-r26c
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Debug - List files
      run: |
        echo "Repository structure:"
        find . -type f -name "*.py" -o -name "*.spec" -o -name "*.yml" -o -name "*.yaml" | sort
        
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install system dependencies
      run: |
        echo "正在安装系统依赖..."
        sudo apt update -y -qq
        sudo apt install -y -qq git openjdk-11-jdk unzip wget
        
    - name: Setup swap space
      run: |
        echo "正在创建8GB swap空间..."
        sudo dd if=/dev/zero of=/swapfile bs=1M count=8192
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        
    - name: Install Buildozer
      run: |
        python -m pip install --upgrade pip
        pip install \"cython>=0.29,<3.0\"
        pip install buildozer
        
    - name: Setup Android SDK
      run: |
        echo "正在设置Android SDK..."
        mkdir -p $ANDROID_HOME/cmdline-tools
        wget -q -O sdk-tools.zip "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
        unzip -q sdk-tools.zip -d $ANDROID_HOME/cmdline-tools
        mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME --licenses
        
    - name: Setup Android NDK
      run: |
        echo "正在设置Android NDK..."
        wget -q -O ndk.zip "https://dl.google.com/android/repository/android-ndk-r25b-linux.zip"
        unzip -q ndk.zip -d /tmp/
        mv /tmp/android-ndk-r25b $ANDROID_NDK_ROOT
        
    - name: Configure Buildozer
      run: |
        cat > buildozer.spec << 'EOF'
[app]
title = Mouse Clicker
package.name = mouseclicker
package.domain = com.birdshit34
source.dir = .
source.include_exts = py,png,jpg,kv,atlas
requirements = python,kivy
version = 1.0.0
[app:android]
android.permissions = SYSTEM_ALERT_WINDOW
android.api = 30
android.minapi = 21
[buildozer]
log_level = 2
EOF
        
    - name: Build APK
      run: |
        echo "开始构建APK，预计需要20-30分钟..."
        export PATH=$PATH:$ANDROID_HOME/platform-tools
        timeout 1800 buildozer -v android debug
        
    - name: Upload APK as Artifact
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() && always() }}
      with:
        name: MouseClicker-APK-v${{ github.run_number }}
        path: |
          bin/*.apk
          *.log
        retention-days: 90
        
    - name: Display success
      if: ${{ success() }}
      run: |
        echo "✅ BUILD SUCCESSFUL!"
        echo "APK已上传，请下载 Artifacts"
        
    - name: Display failure
      if: ${{ failure() }}
      run: |
        echo "❌ BUILD FAILED - 查看上方日志"
