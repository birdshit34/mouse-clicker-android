name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: ~

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git zip unzip openjdk-11-jdk wget curl

      - name: Increase swap memory
        run: |
          sudo dd if=/dev/zero of=/swapfile bs=1M count=8192
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install cython==0.29.37
          pip install buildozer

      - name: Setup Android SDK
        run: |
          mkdir -p /opt/android-sdk/cmdline-tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/sdk.zip
          unzip /tmp/sdk.zip -d /opt/android-sdk/cmdline-tools
          mv /opt/android-sdk/cmdline-tools/cmdline-tools /opt/android-sdk/cmdline-tools/latest
          export ANDROID_HOME=/opt/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-30" "build-tools;30.0.3"

      - name: Setup Android NDK
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export PATH=$PATH:$ANDROID_HOME/platform-tools
          wget https://dl.google.com/android/repository/android-ndk-r21e-linux-x86_64.zip -O /tmp/ndk.zip
          unzip /tmp/ndk.zip -d /opt/
          export ANDROID_NDK_HOME=/opt/android-ndk-r21e

      - name: Create buildozer configuration
        run: |
          cat > buildozer.spec << 'SPEC_EOF'
[app]

title = Mouse Clicker

package.name = mouseclicker

package.domain = com.birdshit34

source.dir = .

source.include_exts = py,png,jpg,kv,atlas

requirements = python,kivy

version = 1.0.0

[app:android]

android.permissions = SYSTEM_ALERT_WINDOW

android.api = 30

android.minapi = 21

android.ndk = 21.4.7075529

[buildozer]

log_level = 2

SPEC_EOF

      - name: Build Android APK
        timeout-minutes: 30
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_NDK_HOME=/opt/android-ndk-r21e
          export PATH=$PATH:$ANDROID_HOME/platform-tools
          timeout 1800 buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: MouseClicker-APK
          path: bin/*.apk
          retention-days: 30
