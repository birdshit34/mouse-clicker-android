name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
        
      - name: Setup swap
        run: |
          sudo swapoff -a || true
          sudo rm -f /swapfile || true
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
        
      - name: Setup Android SDK
        run: |
          # 设置 Android SDK 目录
          export ANDROID_HOME=~/.buildozer/android/platform/android-sdk
          export ANDROID_SDK_ROOT=\
          
          mkdir -p \/cmdline-tools
          cd \/cmdline-tools
          
          # 下载命令行工具
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdtools.zip
          unzip -q cmdtools.zip
          rm cmdtools.zip
          
          # 重命名为 latest (buildozer 期望的结构)
          mv cmdline-tools latest
          
          # 设置环境变量
          echo "ANDROID_HOME=\" >> \
          echo "ANDROID_SDK_ROOT=\" >> \
          echo "\/cmdline-tools/latest/bin" >> \
          
          # 接受许可证
          yes | \/cmdline-tools/latest/bin/sdkmanager --licenses
          
          # 安装必要的 SDK 组件
          \/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-30" "build-tools;30.0.3"
        
      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v3
        with:
          path: ~/.buildozer/android/platform/android-ndk-r25b
          key: ndk-r25b-final
        
      - name: Download Android NDK r25b
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.buildozer/android/platform
          cd ~/.buildozer/android/platform
          wget --no-check-certificate "https://dl.google.com/android/repository/android-ndk-r25b-linux.zip" -O ndk.zip
          unzip -q ndk.zip
          rm ndk.zip
        
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36 --no-cache-dir
        
      - name: Create buildozer.spec
        run: |
          cat > buildozer.spec << 'EOF'
[app]
title = Mouse Clicker
package.name = mouseclicker
package.domain = com.birdshit34
source.dir = .
source.include_exts = py,png,jpg,kv,atlas
requirements = python3,kivy
version = 1.0.0

[app:android]
android.permissions = SYSTEM_ALERT_WINDOW
android.api = 30
android.minapi = 21
android.ndk = 25b

[buildozer]
log_level = 2
EOF
        
      - name: Build APK
        run: |
          export ANDROID_HOME=~/.buildozer/android/platform/android-sdk
          export ANDROID_SDK_ROOT=\
          buildozer -v android debug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: MouseClicker-APK
          path: bin/*.apk
