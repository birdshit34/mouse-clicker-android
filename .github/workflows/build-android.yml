name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
        
      - name: Setup swap
        run: |
          sudo swapoff -a || true
          sudo rm -f /swapfile || true
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
        
      - name: Setup Android SDK
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools
          cd ~/.buildozer/android/platform/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdtools.zip
          unzip -q cmdtools.zip
          mv cmdline-tools latest
          rm cmdtools.zip
          yes | ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
        
      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v3
        with:
          path: ~/.buildozer/android/platform/android-ndk-r25b
          key: ndk-r25b-official
        
      - name: Download Android NDK r25b
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.buildozer/android/platform
          cd ~/.buildozer/android/platform
          wget --no-check-certificate "https://dl.google.com/android/repository/android-ndk-r25b-linux.zip" -O ndk.zip
          unzip -q ndk.zip
          rm ndk.zip
        
      - name: Install dependencies
        run: pip install buildozer==1.2.0 cython==0.29.36 --no-cache-dir
        
      - name: Create buildozer.spec
        run: |
          echo "[app]" > buildozer.spec
          echo "title = Mouse Clicker" >> buildozer.spec
          echo "package.name = mouseclicker" >> buildozer.spec
          echo "package.domain = com.birdshit34" >> buildozer.spec
          echo "source.dir = ." >> buildozer.spec
          echo "source.include_exts = py,png,jpg,kv,atlas" >> buildozer.spec
          echo "requirements = python,kivy" >> buildozer.spec
          echo "version = 1.0.0" >> buildozer.spec
          echo "" >> buildozer.spec
          echo "[app:android]" >> buildozer.spec
          echo "android.permissions = SYSTEM_ALERT_WINDOW" >> buildozer.spec
          echo "android.api = 30" >> buildozer.spec
          echo "android.minapi = 21" >> buildozer.spec
          echo "" >> buildozer.spec
          echo "[buildozer]" >> buildozer.spec
          echo "log_level = 2" >> buildozer.spec
        
      - name: Build APK
        run: buildozer -v android debug build
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: MouseClicker-APK
          path: bin/*.apk
