name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5 
        with:
          python-version: '3.8'
        
      - name: Setup swap
        run: |
          sudo swapoff -a || true
          sudo rm -f /swapfile || true
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h
        
      - name: Install dependencies
        run: |
          pip install buildozer==1.2.0 cython==0.29.36 --no-cache-dir
        
      - name: Build APK
        run: buildozer -v android debug build
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MouseClicker-APK
          path: bin/*.apk
