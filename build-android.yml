name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git openjdk-8-jdk unzip wget curl
        
    - name: Install Buildozer
      run: |
        pip install buildozer
        pip install cython==0.29.32
        
    - name: Setup Android SDK
      run: |
        # 设置环境变量
        export ANDROID_HOME=$HOME/android-sdk
        export ANDROID_SDK_ROOT=$HOME/android-sdk
        
        # 创建目录
        mkdir -p $HOME/android-sdk/cmdline-tools
        
        # 下载Android SDK命令行工具
        wget -O sdk-tools.zip "https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip"
        
        # 解压SDK工具
        unzip sdk-tools.zip -d $HOME/android-sdk/cmdline-tools
        
        # 移动文件到正确位置
        mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
        
        # 接受许可证
        yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/android-sdk --licenses
        
    - name: Setup Android NDK
      run: |
        # 设置环境变量
        export ANDROID_HOME=$HOME/android-sdk
        export ANDROID_SDK_ROOT=$HOME/android-sdk
        
        # 安装必要组件
        $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platform-tools" "platforms;android-30" "build-tools;30.0.3"
        
        # 下载并安装NDK
        wget -O android-ndk.zip "https://dl.google.com/android/repository/android-ndk-r25b-linux.zip"
        unzip android-ndk.zip -d $HOME
        export ANDROID_NDK_ROOT=$HOME/android-ndk-r25b
        
    - name: Increase swap space
      run: |
        # 增加swap空间以解决内存不足问题
        sudo fallocate -l 8G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        sudo swapon --show
        
    - name: Configure Buildozer
      run: |
        # 复制配置文件（如果存在）
        if [ -f buildozer.spec ]; then
          cp buildozer.spec .
        else
          # 创建默认的buildozer.spec
          cat > buildozer.spec << 'EOF'
[app]
title = Mouse Clicker
package.name = mouseclicker
package.domain = com.example
source.dir = .
source.include_exts = py,png,jpg,kv,atlas
requirements = python,kivy
version = 1.0.0
[app:android]
android.permissions = SYSTEM_ALERT_WINDOW
android.api = 30
android.minapi = 21
[buildozer]
log_level = 2
EOF
        fi
        
    - name: Build APK
      run: |
        # 设置环境变量
        export ANDROID_HOME=$HOME/android-sdk
        export ANDROID_SDK_ROOT=$HOME/android-sdk
        export ANDROID_NDK_ROOT=$HOME/android-ndk-r25b
        export PATH=$PATH:$ANDROID_HOME/platform-tools:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_NDK_ROOT
        
        # 构建APK (使用详细日志级别)
        echo "开始构建APK，这可能需要15-30分钟..."
        buildozer -v android debug 2>&1 | tee build.log
        
        # 显示构建结果
        echo "构建完成！"
        
    - name: Upload APK
      uses: actions/upload-artifact@v3
      if: success()
      with:
        name: MouseClicker-APK
        path: bin/*.apk
        
    - name: Display build log on failure
      if: failure()
      run: |
        echo "=== 构建失败，显示日志 ==="
        cat build.log || true
        echo "=== 当前目录结构 ==="
        find . -name "*.apk" -o -name "*.log" | head -20